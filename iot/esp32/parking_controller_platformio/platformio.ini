[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
  knolleary/PubSubClient @ ^2.8
  bblanchon/ArduinoJson @ ^7.0.4
  adafruit/Adafruit MCP23017 Arduino Library @ ^2.3.2
  madhephaestus/ESP32Servo @ ^3.0.5
build_flags =
  -DCORE_DEBUG_LEVEL=1
