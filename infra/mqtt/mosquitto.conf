# ============================================================
#  Mosquitto Configuration — Eclipse Mosquitto 2.x
# ============================================================

# Listener padrão (sem TLS)
listener 1883
protocol mqtt

# WebSocket (opcional — útil para debug via browser)
listener 9001
protocol websockets

# Permitir conexões anônimas (desenvolvimento local)
allow_anonymous true

# Persistência
persistence true
persistence_location /mosquitto/data/

# Logs
log_dest stdout
log_type all
